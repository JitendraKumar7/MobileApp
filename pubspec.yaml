name: tally
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.15.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  pdf: ^3.6.5
  intl: ^0.17.0
  share: ^2.0.4
  rxdart: ^0.27.3
  shimmer: ^2.0.0
  provider: ^6.0.2
  printing: ^5.6.6
  app_review: ^2.1.1+1
  screenshot: ^1.2.3
  package_info: ^2.0.2
  flutter_bloc: ^8.0.1
  google_fonts: ^2.2.0
  url_strategy: ^0.2.0
  flow_builder: ^0.0.6
  empty_widget: ^0.0.5
  image_picker: ^0.8.4+4
  path_provider: ^2.0.8
  cloud_firestore: ^3.1.6
  cupertino_icons: ^1.0.4
  simple_animations: ^4.0.1
  font_awesome_flutter: ^9.2.0
  cached_network_image: ^3.2.0

  form_inputs:
    path: packages/form_inputs

  easy_web_view:
    path: packages/easy_web_view

  emoji_feedback:
    path: packages/emoji_feedback

  authentication_repository:
    path: packages/authentication_repository

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^1.0.4

flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/icons/

